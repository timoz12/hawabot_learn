# Default tabletop companion character for development and testing.
# In production, this file is generated by the Hawa Labs design platform.

name: "Bolt"
skeleton: humanoid
tier: spark

appearance:
  color_primary: "#3B82F6"
  color_secondary: "#1E40AF"
  style: "friendly robot companion"

# Joint overrides — omit to use tier defaults.
joints: {}

# Character-specific animations.
# Each animation is a list of keyframes: {joints: {joint_name: angle}, duration_ms: int}
animations:
  wave:
    - joints: { left_shoulder_pitch: -90 }
      duration_ms: 400
    - joints: { left_shoulder_pitch: -45 }
      duration_ms: 200
    - joints: { left_shoulder_pitch: -90 }
      duration_ms: 200
    - joints: { left_shoulder_pitch: -45 }
      duration_ms: 200
    - joints: { left_shoulder_pitch: -90 }
      duration_ms: 200
    - joints: { left_shoulder_pitch: 0 }
      duration_ms: 400

  nod:
    - joints: { head_tilt: -15 }
      duration_ms: 200
    - joints: { head_tilt: 0 }
      duration_ms: 200
    - joints: { head_tilt: -15 }
      duration_ms: 200
    - joints: { head_tilt: 0 }
      duration_ms: 200

  shake_head:
    - joints: { head_pan: -30 }
      duration_ms: 200
    - joints: { head_pan: 30 }
      duration_ms: 300
    - joints: { head_pan: -30 }
      duration_ms: 300
    - joints: { head_pan: 0 }
      duration_ms: 200

  happy:
    - joints: { head_tilt: -10, left_shoulder_pitch: -60, right_shoulder_pitch: -60 }
      duration_ms: 300
    - joints: { left_shoulder_pitch: -30, right_shoulder_pitch: -30 }
      duration_ms: 200
    - joints: { left_shoulder_pitch: -60, right_shoulder_pitch: -60 }
      duration_ms: 200
    - joints: { left_shoulder_pitch: -30, right_shoulder_pitch: -30 }
      duration_ms: 200
    - joints: { head_tilt: 0, left_shoulder_pitch: 0, right_shoulder_pitch: 0 }
      duration_ms: 400

  thinking:
    - joints: { head_tilt: -10, head_pan: 20 }
      duration_ms: 500
    - joints: { left_shoulder_pitch: -30 }
      duration_ms: 300
    - joints: {}
      duration_ms: 1500
    - joints: { head_tilt: 0, head_pan: 0, left_shoulder_pitch: 0 }
      duration_ms: 400

  greeting:
    - joints: { waist_yaw: -15, head_pan: -10 }
      duration_ms: 300
    - joints: { right_shoulder_pitch: -90 }
      duration_ms: 400
    - joints: { right_shoulder_pitch: -45 }
      duration_ms: 200
    - joints: { right_shoulder_pitch: -90 }
      duration_ms: 200
    - joints: { waist_yaw: 0, head_pan: 0, right_shoulder_pitch: 0 }
      duration_ms: 500

  rest:
    - joints: { head_pan: 0, head_tilt: 0, left_shoulder_pitch: 0, right_shoulder_pitch: 0, waist_yaw: 0 }
      duration_ms: 600
